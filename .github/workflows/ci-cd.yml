name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Test & Lint Backend
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci

      - name: Run Backend Build/Checks
        run: |
          cd server
          # If backend had tests, we would run: npm test
          echo "Backend checks passed"

  # Job 2: Build & Test Frontend
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          npm ci

      - name: Compile Production React Build
        run: |
          npm run build
        env:
          CI: false # Prevents warnings from being treated as errors during compilation

  # Job 3: Docker Build Validation
  docker-validation:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false # Only compile image to verify Dockerfile correctness

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false # Only compile image to verify Dockerfile correctness
