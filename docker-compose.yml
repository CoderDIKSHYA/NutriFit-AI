services:
  database:
    image: mongo:6.0
    container_name: fitness-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fitness-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://database:27017/fitness-tracker
      - JWT_SECRET=change_me_to_something_secure_in_production
      - EDAMAM_APP_ID=${EDAMAM_APP_ID}
      - EDAMAM_APP_KEY=${EDAMAM_APP_KEY}
      - RAPID_API_HOST=${RAPID_API_HOST}
      - RAPID_API_KEY=${RAPID_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - database

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitness-frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo-data:
